name: Build & Publish twitch-miner-go

on:
  schedule:
    # Run daily at 3 AM UTC to pick up new upstream releases
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-twitch-miner-go.yml'

concurrency:
  group: build-twitch-miner-go
  cancel-in-progress: false

env:
  UPSTREAM_REPO: Guliveer/twitch-miner-go
  IMAGE_NAME: ghcr.io/fgrfn/twitch-miner-go

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout upstream repository
        uses: actions/checkout@v4
        with:
          repository: Guliveer/twitch-miner-go
          fetch-depth: 0

      - name: Get latest tag / version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          GIT_COMMIT=$(git rev-parse --short HEAD)
          if [ -z "${LATEST_TAG}" ]; then
            VERSION_TAG="main-${GIT_COMMIT}"
          else
            VERSION_TAG="${LATEST_TAG}"
          fi
          echo "tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "commit=${GIT_COMMIT}" >> "$GITHUB_OUTPUT"
          echo "Latest tag: ${VERSION_TAG}, commit: ${GIT_COMMIT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
            GIT_COMMIT=${{ steps.version.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create summary
        run: |
          echo "### ✅ twitch-miner-go Docker image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ steps.version.outputs.commit }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
