name: gitleaks

on: [pull_request, push, workflow_dispatch]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
        with:
          fetch-depth: 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
